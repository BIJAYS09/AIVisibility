version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: peec-db
    restart: always
    environment:
      POSTGRES_USER: peec
      POSTGRES_PASSWORD: peec
      POSTGRES_DB: peec
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  pgdata: